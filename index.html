import types, sys
  import random
  import math

scipy = types.ModuleType('scipy')
stats = types.ModuleType('scipy.stats')
linalg = types.ModuleType('scipy.linalg')

def _noop(*args, **kwargs):
    return None

  def _sample_bernoulli(p=0.5, size=None):
    if size is None:
      return 1 if random.random() < p else 0
    return [1 if random.random() < p else 0 for _ in range(int(size))]

  def _sample_uniform(loc=0.0, scale=1.0, size=None):
    if size is None:
      return random.uniform(loc, loc + scale)
    return [random.uniform(loc, loc + scale) for _ in range(int(size))]

  stats.bernoulli = lambda p=0.5: types.SimpleNamespace(name='bernoulli', rvs=lambda size=None, **k: _sample_bernoulli(p, size))
  stats.uniform = lambda loc=0, scale=1: types.SimpleNamespace(name='uniform', rvs=lambda size=None, **k: _sample_uniform(loc, scale, size))

  def _pascal(n):
    n = int(n)
    return [[math.comb(i, j) if j <= i else 0 for j in range(n)] for i in range(n)]

  linalg.pascal = _pascal
  linalg.eig = _noop
  linalg.inv = _noop
  linalg.solve = _noop

scipy.stats = stats
scipy.linalg = linalg
sys.modules['scipy'] = scipy
sys.modules['scipy.stats'] = stats
sys.modules['scipy.linalg'] = linalg
